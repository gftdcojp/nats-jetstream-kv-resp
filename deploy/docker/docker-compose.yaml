services:
  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"
      - "8222:8222"

  nats-jetstream-kv-resp:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    depends_on:
      - nats
    volumes:
      - ./dev-config.yaml:/etc/kvresp/config.yaml:ro
    ports:
      - "6380:6380"
      - "6381:6381"
      - "9090:9090"
